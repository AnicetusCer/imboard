[Warnings]
# These IDs intentionally keep tooltip sizing and picker anchors stable. The
# small loss of deferred construction is preferable to binding loops or fragile
# cross-component geometry.
DeferredPropertyId=info
# Delegate bodies intentionally refer to stable outer ids such as `root` and
# `view`. Qt's linter cannot always prove those creation contexts after popup
# and view reparenting, so keep this advisory instead of failing the build.
UnqualifiedAccess=info
